name: 🏛️ Ingest — Competitive (Entrance + Recruitment)

# One workflow handles both entrance (JEE/NEET/CAT/GATE/WBJEE/NDA/CLAT/CUET)
# and recruitment (UPSC/SSC/WBPSC/IBPS/RBI/LIC/EPFO/Railway/WBSSC/…). The
# `segment` input decides nature=entrance vs nature=recruitment downstream
# (see models/schemas.derive_scope_nature). Pipeline CLI still accepts the
# legacy "competitive" alias, so old saved-dispatch links keep working.

on:
  workflow_dispatch:
    inputs:
      segment:
        description: 'Segment (entrance | recruitment | competitive [legacy])'
        required: true
        default: 'recruitment'
        type: choice
        options: [entrance, recruitment, competitive]
      authority:
        # Free-text: ENTRANCE_TREE + RECRUITMENT_TREE together have ~20+
        # authorities (WBPSC, UPSC, SSC, IBPS, RBI, LIC, EPFO, Railway,
        # WBSSC, WBPRB, WBBPE, JEE, NEET, CAT, GATE, WBJEE, NDA, CLAT, CUET, …).
        # Using `type: string` avoids drift between YAML and curriculum.py.
        description: 'Authority (UPSC | SSC | WBPSC | JEE | NEET | WBJEE | GATE | …)'
        required: true
        default: 'WBPSC'
        type: string
      exam:
        description: 'Exam name (e.g. "WBCS Prelims", "JEE Main 2024")'
        required: true
        default: 'WBCS Prelims'
      topic:
        description: 'Topic (e.g. "History of India", "Physics - Mechanics")'
        required: true
        default: 'History of India'
      count:
        description: 'Number of MCQs to generate (1–20)'
        required: true
        default: '8'
      source_url:
        description: 'Source URL (optional)'
        required: false
        default: ''

jobs:
  ingest:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout pipeline repo
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run pipeline — সর্বজ্ঞ → চিত্রগুপ্ত → সূত্রধর → বিদূষক → ধর্মরক্ষক
        env:
          SUPABASE_URL:         ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          GROQ_API_KEY:         ${{ secrets.GROQ_API_KEY }}
          SARVAM_API_KEY:       ${{ secrets.SARVAM_API_KEY }}
          GROQ_GUARD_MODEL:     llama-guard-3-8b
          PHOENIX_ENDPOINT:     ${{ secrets.PHOENIX_ENDPOINT }}
        run: |
          ARGS="--segment ${{ github.event.inputs.segment }} \
                --authority ${{ github.event.inputs.authority }} \
                --exam \"${{ github.event.inputs.exam }}\" \
                --topic \"${{ github.event.inputs.topic }}\" \
                --count ${{ github.event.inputs.count }}"

          if [ -n "${{ github.event.inputs.source_url }}" ]; then
            ARGS="$ARGS --source-url ${{ github.event.inputs.source_url }}"
          fi

          eval python gyan_pipeline.py $ARGS
